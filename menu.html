<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Okul VBS Menü</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; overflow-x: hidden; }
        
        /* Üst Mavi Alan */
        .header {
            background: linear-gradient(135deg, #1a3a8a 0%, #2955c8 100%);
            height: 220px; padding: 20px; color: white; text-align: center;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .nav-icon-box { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-img { width: 45px; height: 45px; object-fit: contain; }
        .nav-text { font-size: 11px; font-weight: 500; }

        .user-photo { width: 85px; height: 110px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.4); object-fit: cover; margin: 0 auto 10px; display: block; }
        .user-info-text { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .user-sub-text { font-size: 13px; opacity: 0.9; }

        /* Üst Kare Menü Izgarası */
        .grid-container {
            background: white; margin: -30px 15px 15px 15px; border-radius: 12px;
            display: grid; grid-template-columns: repeat(3, 1fr);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #eee;
        }

        /* Diğer bütün butonlar büyütüldü */
        .grid-item {
            display: flex; align-items: center; justify-content: center;
            height: 110px; /* Diğerleri için yüksekliği artırdım */
            text-decoration: none; border: 0.5px solid #f0f0f0;
        }

        .grid-icon { 
            width: 85%; /* Diğer ikonlar jilet gibi büyüdü */
            height: 85%; 
            max-height: 85px; 
            object-fit: contain; 
        }

        /* --- SADECE NOT BİLGİLERİ SABİT (KÜÇÜK) KALIYOR --- */
        .grid-item.not-ozel {
            height: 90px !important; /* Yüksekliği küçük tuttuk */
            padding: 5px;
        }

        .grid-item.not-ozel .grid-icon {
            width: 60% !important; /* İkonu büyümesini engelledik */
            height: 60% !important;
            max-height: 55px !important;
        }

        /* Alt Liste Tasarımı (Büyük ve Dolgun) */
        .list-container { margin: 0 15px 20px 15px; display: flex; flex-direction: column; gap: 12px; }

        .list-item {
            background: white; padding: 18px 20px; border-radius: 14px;
            display: flex; align-items: center; text-decoration: none;
            color: #444; font-size: 15px; font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eee;
        }

        .list-logo { width: 42px; height: 42px; object-fit: contain; margin-right: 18px; }
        .list-text { flex-grow: 1; }
        .list-arrow { color: #bbb; font-size: 24px; }

    </style>
</head>
<body>

    <div class="header">
        <div class="top-nav">
            <div class="nav-icon-box" onclick="location.href='hata.html'">
                <img src="icons/bildirimler.jpeg" class="nav-img">
                <span class="nav-text">Bildirimler</span>
            </div>
            <img src="assets/student_photo.jpg" class="user-photo">
            <div class="nav-icon-box" onclick="location.href='index.html'">
                <img src="icons/öğrencideğiştir.jpeg" class="nav-img">
                <span class="nav-text">Öğrenci Değiştir</span>
            </div>
        </div>
        <div class="user-info-text">Abdullah Erkam Kahraman</div>
        <div class="user-sub-text">11.Sınıf - 93</div>
    </div>

    <div class="grid-container">
        <a href="notlar.html" class="grid-item not-ozel">
            <img src="icons/notlar.jpeg" class="grid-icon">
        </a>
        <a href="devamsizlik.html" class="grid-item">
            <img src="icons/devamsızlık.jpeg" class="grid-icon">
        </a>
        <a href="hata.html" class="grid-item">
            <img src="icons/dersprogramı.jpeg" class="grid-icon">
        </a>
        <a href="hata.html" class="grid-item">
            <img src="icons/sınavtarihi.jpeg" class="grid-icon">
        </a>
        <a href="sube_ortalama.html" class="grid-item">
            <img src="icons/yazılıortalama.jpeg" class="grid-icon">
        </a>
        <a href="yilsonu_notlari.html" class="grid-item">
            <img src="icons/yılsonunot.jpeg" class="grid-icon">
        </a>
    </div>

    <div class="list-container">
        <a href="devamsizlik.html" class="list-item">
            <img src="icons/dersdevamsızlık.jpeg" class="list-logo">
            <span class="list-text">Ders Devamsızlıkları</span>
            <span class="list-arrow">›</span>
        </a>
        <a href="hata.html" class="list-item">
            <img src="icons/nakil.jpeg" class="list-logo">
            <span class="list-text">Nakil Bilgileri</span>
            <span class="list-arrow">›</span>
        </a>
        <a href="hata.html" class="list-item">
            <img src="icons/sorumluluk.jpeg" class="list-logo">
            <span class="list-text">Sorumluluk Bilgileri</span>
            <span class="list-arrow">›</span>
        </a>
        <a href="hata.html" class="list-item">
            <img src="icons/aldığıbelge.jpeg" class="list-logo">
            <span class="list-text">Aldığı Belgeler</span>
            <span class="list-arrow">›</span>
        </a>
    </div>

</body>
</html>
